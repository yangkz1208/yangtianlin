<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎂 杨天琳 · 生日快乐</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 彻底重置定位基准 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0c1f; }
    
    body { 
        position: relative;
        font-family: 'Quicksand', sans-serif; 
        -webkit-tap-highlight-color: transparent; 
        perspective: 1200px; /* 3D透视 */
    }

    /* Canvas 必须锁定在最底层，且铺满全屏 */
    #canvas-bg { 
        position: absolute; top: 0; left: 0; 
        width: 100vw; height: 100vh; 
        display: block; z-index: 1; 
    }

    /* 遮罩层居中 */
    #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.92); z-index: 3000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; cursor: pointer; backdrop-filter: blur(8px);
        font-size: 1.3rem; text-align: center; padding: 20px;
        transition: opacity 0.5s ease;
    }

    /* 主界面文字绝对居中 */
    .birthday-message {
      position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      text-align: center; color: white; z-index: 100; 
      width: 100%; pointer-events: none;
      transition: opacity 0.6s ease, filter 0.6s ease;
    }
    .trigger-egg { pointer-events: auto; display: inline-block; }

    .name-a {
      font-family: 'Dancing Script', cursive; font-size: clamp(3rem, 12vw, 7rem);
      background: linear-gradient(135deg,#ffe99c,#ffd1f9,#a7e0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 25px rgba(255,179,217,0.4); margin-bottom: 15px;
    }
    .birthday-text {
      font-size: clamp(1.4rem, 6vw, 2.8rem); font-weight: 600;
      color: #fff5e6; text-shadow: 0 0 20px #ff99cc;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(5px);
      padding: 12px 30px; border-radius: 50px;
      border: 1px solid rgba(255,215,245,0.3);
    }

    /* 卡片定位修正：强制使用 transform-origin 中心旋转 */
    #id5-card {
      position: absolute; top: 50%; left: 50%; 
      width: 88vw; max-width: 350px; 
      height: 75vh; max-height: 550px;
      margin: 0; 
      /* 核心修正：初始位置必须包含 translate(-50%, -50%) */
      transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg) scale(0.8);
      transform-origin: center center;
      background: linear-gradient(145deg, #1e1e20, #0a0a0b); 
      border: 2px solid #d4af37; border-radius: 18px; 
      z-index: 1000; opacity: 0; pointer-events: none;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
      padding: 30px 20px; color: #f0f0f0;
      transform-style: preserve-3d;
      transition: opacity 0.4s ease, transform 0.1s ease-out;
    }
    #id5-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

    .rarity-tag {
      background: linear-gradient(90deg, #d4af37, #f7e695); color: #1a1a1a;
      font-weight: 800; padding: 4px 18px; font-size: 0.75rem;
      position: absolute; top: 15px; left: -8px; transform: rotate(-5deg);
    }
    .skin-title { margin-top: 25px; color: #d4af37; font-size: 1.6rem; font-weight: bold; }
    
    /* 内容区自动缩放滚动，防止撑开卡片 */
    .skin-desc { 
      flex: 1; width: 100%; overflow-y: auto;
      font-size: 0.85rem; line-height: 1.6; color: #ececec; 
      background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px;
      margin: 15px 0; text-align: left; border-left: 3px solid #d4af37;
    }

    .back-btn {
      width: 100%; padding: 12px; background: #d4af37; border: none;
      color: #1a1a1a; border-radius: 30px; font-weight: 800; cursor: pointer;
    }
    .zk-mini-card {
      width: 100%; margin-top: 10px; padding: 8px; background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(212, 175, 55, 0.4); border-radius: 12px; color: #d4af37;
      text-decoration: none; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .footer-note { position: absolute; bottom: 15px; right: 20px; color: rgba(255,255,255,0.2); font-size: 0.7rem; z-index: 10; }
  </style>
</head>
<body>
  <audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/yangkz1208/yangtianlin/main/114514.mp3" type="audio/mpeg">
  </audio>
  
  <div id="start-overlay">
    <div>🎂 点一下开启惊喜 🎂</div>
  </div>

  <canvas id="canvas-bg"></canvas>
  
  <div class="birthday-message" id="main-ui">
    <div class="name-a trigger-egg">杨天琳(/^▽^)/</div><br>
    <div class="birthday-text trigger-egg">生日快乐</div>
  </div>

  <div id="id5-card">
    <div class="rarity-tag">稀世 (S-Rank)</div>
    <div class="skin-title">永恒光辉</div>
    <div style="font-size: 3rem; margin: 10px;">🕯️</div>
    <div class="skin-desc" id="typewriter-content"></div>

    <button class="back-btn" id="close-card">收下时装</button>
    <a href="https://yangkz1208.github.io/zk" class="zk-mini-card">
        <span>🎁</span> 查看更多内容 ➔
    </a>
  </div>

  <div class="footer-note">🎈 by 杨凯哲</div>

  <script>
    (function(){
      const overlay = document.getElementById('start-overlay');
      const audio = document.getElementById('bgm');
      const mainUI = document.getElementById('main-ui');
      const id5Card = document.getElementById('id5-card');
      const closeBtn = document.getElementById('close-card');
      const triggerBtns = document.querySelectorAll('.trigger-egg');
      const typewriterContainer = document.getElementById('typewriter-content');
      
      let clickCount = 0;
      let lastClickTime = 0;
      let isCardActive = false;

      // 1. 打字机
      function startTypewriter() {
          const fullText = `愿你在奔跑的年纪里，眼里有光，心中有火。<br>不管世界如何喧嚣，你永远是你最耀眼的自己。<br>🌸 祝你岁岁年年，万事胜意 🌸<br><hr style="opacity:0.2;margin:10px 0;"><small style="color:#d4af37;">YKZ特别备注：</small><br>给你建网站累死了，你有许多“好看”的照片在我这(😏)，记得加微信！`;
          typewriterContainer.innerHTML = "";
          let i = 0;
          const timer = setInterval(() => {
              if (fullText[i] === '<') {
                  let tagEnd = fullText.indexOf('>', i);
                  typewriterContainer.innerHTML += fullText.substring(i, tagEnd + 1);
                  i = tagEnd + 1;
              } else {
                  typewriterContainer.innerHTML += fullText[i];
                  i++;
              }
              if (i >= fullText.length) clearInterval(timer);
          }, 40);
      }

      // 2. 3D跟随修正：计算偏移量时必须保留 translate(-50%, -50%)
      window.addEventListener('mousemove', (e) => {
          if (!isCardActive) return;
          const x = (window.innerWidth / 2 - e.clientX) / 20;
          const y = (window.innerHeight / 2 - e.clientY) / 20;
          id5Card.style.transform = `translate(-50%, -50%) rotateX(${y}deg) rotateY(${-x}deg)`;
      });

      // 3. 点击逻辑
      overlay.addEventListener('click', () => {
          audio.play().catch(() => {});
          overlay.style.opacity = '0';
          setTimeout(() => overlay.style.display = 'none', 500);
      });

      triggerBtns.forEach(btn => {
          btn.addEventListener('click', () => {
              const now = Date.now();
              if (now - lastClickTime > 1500) clickCount = 0;
              clickCount++;
              lastClickTime = now;

              if(clickCount >= 5 && !isCardActive) {
                  isCardActive = true;
                  mainUI.style.opacity = "0";
                  mainUI.style.filter = "blur(15px)";
                  setTimeout(() => {
                      id5Card.classList.add('active');
                      startTypewriter();
                  }, 300);
              }
          });
      });

      closeBtn.addEventListener('click', () => {
          id5Card.classList.remove('active');
          isCardActive = false;
          id5Card.style.transform = `translate(-50%, -50%) scale(0.8)`;
          setTimeout(() => {
              mainUI.style.opacity = "1";
              mainUI.style.filter = "blur(0)";
              clickCount = 0;
          }, 400);
      });

      // 4. Canvas 高清修正
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d', { alpha: false });
      let particles = [];
      let sparkles = [];
      let dpr = window.devicePixelRatio || 1;

      class Balloon {
        constructor(w, h){ 
            this.w = w; this.h = h; 
            this.radius = Math.random() * 20 + 20;
            this.reset(true); 
        }
        reset(randomY=true){
          this.x = Math.random() * (this.w - this.radius * 2) + this.radius;
          this.y = randomY ? Math.random() * this.h : this.h + 100;
          this.color = ['#FF6B8B','#FF8E53','#FFD166','#06D6A0','#118AB2','#9D4EDD'][Math.floor(Math.random()*6)];
          this.vy = -(Math.random() * 0.6 + 0.6); 
          this.vx = Math.random() * 0.4 - 0.2;
          this.phase = Math.random() * 6.28;
        }
        update(){
          this.y += this.vy; this.x += this.vx;
          if(this.y + this.radius < -50) this.reset(false);
        }
        draw(ctx){
          ctx.save();
          const r = this.radius + Math.sin(Date.now() * 0.002 + this.phase) * 3;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(this.x, this.y, r, 0, 6.28);
          const g = ctx.createRadialGradient(this.x-r/3, this.y-r/3, 0, this.x, this.y, r);
          g.addColorStop(0, 'rgba(255,255,255,0.4)');
          g.addColorStop(1, this.color);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }
      }

      function resize() {
          const w = window.innerWidth;
          const h = window.innerHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.scale(dpr, dpr);
          particles = Array.from({length: 40}, () => new Balloon(w, h));
      }

      function animate() {
          ctx.fillStyle = '#0f0c29';
          ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
          particles.forEach(p => { p.update(); p.draw(ctx); });
          requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();
    })();
  </script>
</body>
</html>
