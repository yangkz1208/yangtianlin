<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎂 杨天琳 · 生日快乐( ´ ▽ ` )ﾉ</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ overflow:hidden; background:#0f0c1f; font-family:'Quicksand',sans-serif; }
    #canvas-bg{ position:fixed; top:0; left:0; width:100%; height:100%; display:block; pointer-events:none; }
    .birthday-message{
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; color:white; z-index:20; pointer-events:none;
      text-shadow:0 0 20px rgba(0,0,0,0.5),0 0 40px rgba(255,120,200,0.3);
      animation:floatText 3s ease-in-out infinite; width:100%; padding:0 20px;
    }
    .name-a{
      font-family:'Dancing Script',cursive; 
      font-size: clamp(3.2rem, 12vw, 8rem);
      font-weight:700;
      line-height:1.2;
      background:linear-gradient(135deg,#ffe99c,#ffd1f9,#a7e0ff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow:0 0 30px #ffb3d9,0 0 60px #a56bff;
      letter-spacing:8px;
      margin-bottom:10px;
      filter:drop-shadow(0 10px 12px rgba(0,0,0,0.2));
      white-space: nowrap;
    }
    .birthday-text{
      font-size:clamp(1.8rem,8vw,4rem); font-weight:600; letter-spacing:6px;
      color:#fff5e6; text-shadow:0 0 20px #ff99cc,0 0 40px #b266ff,2px 4px 10px rgba(0,0,0,0.3);
      background:rgba(255,255,255,0.05); backdrop-filter:blur(3px);
      display:inline-block; padding:12px 36px; border-radius:60px;
      border:1px solid rgba(255,215,245,0.6); box-shadow:0 8px 20px rgba(0,0,0,0.2);
      margin-top:10px; animation:glowPulse 2.5s infinite alternate;
    }
    .sub-greeting{
      margin-top:30px; font-size:1.3rem; letter-spacing:4px; color:#fbeaff;
      text-shadow:0 0 15px #ffa0d0; opacity:0.9; font-weight:400;
    }
    @keyframes floatText{
      0%{ transform:translate(-50%,-50%) translateY(0px); }
      50%{ transform:translate(-50%,-50%) translateY(-8px); }
      100%{ transform:translate(-50%,-50%) translateY(0px); }
    }
    @keyframes glowPulse{
      0%{ box-shadow:0 8px 20px rgba(0,0,0,0.2),0 0 15px #ffb3d9; border-color:rgba(255,215,245,0.6); }
      100%{ box-shadow:0 8px 30px rgba(150,0,200,0.4),0 0 30px #ff99e6; border-color:rgba(255,240,255,0.9); }
    }
    .footer-note{
      position:absolute; bottom:18px; right:24px; color:rgba(255,255,255,0.5);
      font-size:0.9rem; z-index:15; pointer-events:none; text-shadow:0 0 8px black; font-style:italic;
    }
    @media (max-width:480px){
      .name-a{ font-size: 3rem; letter-spacing:4px; }
      .birthday-text{ padding:8px 18px; letter-spacing:3px; }
      .footer-note{ font-size:0.75rem; bottom:10px; right:16px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  <div class="birthday-message">
    <div class="name-a">杨天琳(/^▽^)/</div>
    <div class="birthday-text">生日快乐</div>
    <div class="sub-greeting">✨ HAPPY BIRTHDAY ✨</div>
  </div>
  <div class="footer-note">🎈 愿你每一天都闪闪发光ヽ(*≧ω≦)ﾉ by杨凯哲</div>
  <script>
    (function(){
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const PARTICLE_COUNT = 140;
      let animationFrame = null;
      let resizeTimer = null;
      let dpr = window.devicePixelRatio || 1;

      const rand = (min, max) => Math.random() * (max - min) + min;
      const balloonColors = ['#FF6B8B','#FF8E53','#FFD166','#06D6A0','#118AB2','#9D4EDD','#FF99C8','#F15BB5','#FEE440','#00BBF9'];

      class Balloon {
        constructor(w, h){
          this.width = w;
          this.height = h;
          this.reset(true);
        }
        reset(randomY=true){
          this.radius = rand(18, 38);
          this.x = rand(this.radius*1.5, this.width-this.radius*1.5);
          if(randomY) {
            this.y = rand(this.radius, this.height-this.radius);
          } else {
            this.y = this.height + this.radius * 2;
          }
          this.color = balloonColors[Math.floor(Math.random()*balloonColors.length)];
          this.vy = rand(-1.2, -0.5);
          this.vx = rand(-0.25, 0.25);
          this.stringLength = rand(10, 22);
          this.highlightOffset = rand(-4, 4);
        }
        update(){
          this.x += this.vx;
          this.y += this.vy;
          if(this.x - this.radius < 0){
            this.x = this.radius;
            this.vx *= -0.4;
          } else if(this.x + this.radius > this.width){
            this.x = this.width - this.radius;
            this.vx *= -0.4;
          }
          if(this.y + this.radius < 0){
            this.reset(false);
          }
          if(Math.random() < 0.02){
            this.vx += rand(-0.06, 0.06);
            this.vx = Math.min(Math.max(this.vx, -0.45), 0.45);
          }
        }
        draw(ctx){
          ctx.beginPath();
          ctx.moveTo(this.x, this.y + this.radius - 1);
          ctx.lineTo(this.x, this.y + this.radius + this.stringLength);
          ctx.strokeStyle = '#8B6B4D';
          ctx.lineWidth = Math.max(1.5, this.radius*0.12);
          ctx.lineCap = 'round';
          ctx.stroke();

          const grad = ctx.createRadialGradient(
            this.x - this.radius*0.25, this.y - this.radius*0.2, this.radius*0.2,
            this.x, this.y, this.radius*1.2
          );
          grad.addColorStop(0, this.color);
          grad.addColorStop(0.7, this.shadeColor(this.color, -20));
          grad.addColorStop(1, this.shadeColor(this.color, -40));
          
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
          ctx.fillStyle = grad;
          ctx.shadowColor = 'rgba(255,255,200,0.5)';
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.shadowColor = 'transparent';

          let hx = this.x - this.radius*0.2 + this.highlightOffset*0.5;
          let hy = this.y - this.radius*0.3;
          ctx.beginPath();
          ctx.arc(hx, hy, this.radius*0.18, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,255,0.75)';
          ctx.fill();

          ctx.beginPath();
          ctx.arc(hx+this.radius*0.1, hy-this.radius*0.05, this.radius*0.08, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fill();

          ctx.beginPath();
          ctx.arc(this.x, this.y+this.radius-2, this.radius*0.12, 0, Math.PI*2);
          ctx.fillStyle = this.shadeColor(this.color, -35);
          ctx.fill();
        }
        shadeColor(col, p){
          let R = parseInt(col.substring(1,3),16);
          let G = parseInt(col.substring(3,5),16);
          let B = parseInt(col.substring(5,7),16);
          R = Math.max(0, Math.min(255, R + p));
          G = Math.max(0, Math.min(255, G + p));
          B = Math.max(0, Math.min(255, B + p));
          return `#${((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1)}`;
        }
      }

      function initParticles(w,h){
        particles = [];
        for(let i=0;i<PARTICLE_COUNT;i++){
          let b = new Balloon(w,h);
          particles.push(b);
        }
      }

      function resizeCanvas(){
        const w = window.innerWidth;
        const h = window.innerHeight;
        dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
        initParticles(w, h);
      }

      function drawBackground(w,h){
        let grad = ctx.createRadialGradient(w*0.5, h*0.3, w*0.1, w*0.5, h*0.6, w*0.8);
        grad.addColorStop(0, '#1a1a3e');
        grad.addColorStop(0.5, '#23153c');
        grad.addColorStop(1, '#0b0815');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,w,h);

        for(let i=0;i<30;i++){
          if(i%2 === 0) continue;
          let sx = (i*37) % w;
          let sy = (i*83) % h;
          ctx.beginPath();
          ctx.arc(sx, sy, 1.5+(i%3), 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,245,210,${0.2+Math.sin(Date.now()*0.001+i)*0.1})`;
          ctx.fill();
        }
      }

      function animate(){
        const w = window.innerWidth;
        const h = window.innerHeight;
        drawBackground(w, h);
        
        for(let p of particles){
          p.update();
          p.draw(ctx);
        }

        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffe6b0';
        for(let i=0;i<8;i++){
          let t = Date.now() * 0.002;
          let x = (Math.sin(t*0.3+i)*30 + i*70) % w;
          let y = (Math.cos(t*0.2+i*2)*20 + i*50) % h;
          ctx.beginPath();
          ctx.arc(x, y, 2+i%3, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,220,150,${0.4+Math.sin(t+i)*0.2})`;
          ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.shadowColor = 'transparent';
        animationFrame = requestAnimationFrame(animate);
      }

      function handleResize(){
        if(resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeCanvas, 60);
      }

      function start(){
        resizeCanvas();
        if(animationFrame) cancelAnimationFrame(animationFrame);
        animate();
        window.addEventListener('resize', handleResize);
      }

      window.addEventListener('load', start);
      window.addEventListener('beforeunload', ()=>{
        if(animationFrame) cancelAnimationFrame(animationFrame);
        if(resizeTimer) clearTimeout(resizeTimer);
      });
    })();
  </script>
</body>
</html>
