<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎂 杨天琳 · 生日快乐( ´ ▽ ` )ﾉ</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 音乐启动遮罩 */
    #start-overlay {
        position: fixed; top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.9); z-index: 100;
        display: flex; justify-content: center; align-items: center;
        color: white; cursor: pointer; backdrop-filter: blur(5px);
        font-family: 'Quicksand', sans-serif; font-size: 1.5rem;
    }
    
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ overflow:hidden; background:#0f0c1f; font-family:'Quicksand',sans-serif; transition: background 2s; }
    #canvas-bg{ position:fixed; top:0; left:0; width:100%; height:100%; display:block; z-index: 1; }
    
    .birthday-message{
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; color:white; z-index:20; 
      width:100%; padding:0 20px;
      pointer-events: none; /* 整体穿透 */
    }
    
    .name-a{
      font-family:'Dancing Script',cursive; 
      font-size: clamp(3.2rem, 12vw, 8rem);
      font-weight:700; line-height:1.2;
      background:linear-gradient(135deg,#ffe99c,#ffd1f9,#a7e0ff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow:0 0 30px #ffb3d9;
      letter-spacing:8px; margin-bottom:10px;
    }
    
    /* 核心修改点：生日快乐文字改为可点击 */
    .birthday-text{
      pointer-events: auto; cursor: pointer; user-select: none;
      font-size:clamp(1.8rem,8vw,4rem); font-weight:600; letter-spacing:6px;
      color:#fff5e6; text-shadow:0 0 20px #ff99cc;
      background:rgba(255,255,255,0.05); backdrop-filter:blur(3px);
      display:inline-block; padding:12px 36px; border-radius:60px;
      border:1px solid rgba(255,215,245,0.6);
      margin-top:10px; animation:glowPulse 2.5s infinite alternate;
      transition: transform 0.1s;
    }
    .birthday-text:active { transform: scale(0.95); }

    #secret-wish {
      position: fixed; top: 70%; left: 50%; transform: translateX(-50%);
      color: #fff; text-align: center; opacity: 0; transition: opacity 2s;
      z-index: 25; font-size: 1.1rem; line-height: 1.8; width: 85%;
      text-shadow: 0 0 10px #ff69b4; pointer-events: none;
    }

    .sub-greeting{
      margin-top:30px; font-size:1.3rem; letter-spacing:4px; color:#fbeaff;
      opacity:0.9;
    }
    
    @keyframes glowPulse{
      0%{ box-shadow:0 8px 20px rgba(0,0,0,0.2),0 0 15px #ffb3d9; }
      100%{ box-shadow:0 8px 30px rgba(150,0,200,0.4),0 0 30px #ff99e6; }
    }
    .footer-note{
      position:absolute; bottom:18px; right:24px; color:rgba(255,255,255,0.5);
      font-size:0.9rem; z-index:15; pointer-events:none;
    }
  </style>
</head>
<body>
  <audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/yangkz1208/yangtianlin/main/114514.mp3" type="audio/mpeg">
  </audio>
  
  <div id="start-overlay">✨ 点击屏幕，开启生日祝福 ✨</div>
  <canvas id="canvas-bg"></canvas>
  
  <div class="birthday-message">
    <div class="name-a">杨天琳(/^▽^)/</div>
    <div class="birthday-text" id="trigger-btn">生日快乐</div>
    <div class="sub-greeting">✨ HAPPY BIRTHDAY ✨</div>
  </div>

  <div id="secret-wish">
    愿你在奔跑的年纪里，眼里有光，心中有火。<br>
    不管世界如何喧嚣，你永远是你最耀眼的自己。<br>
    🌸 祝你岁岁年年，万事胜意 🌸
  </div>

  <div class="footer-note">🎈 by 杨凯哲</div>

  <script>
    (function(){
      const overlay = document.getElementById('start-overlay');
      const audio = document.getElementById('bgm');
      const triggerBtn = document.getElementById('trigger-btn');
      const secretWish = document.getElementById('secret-wish');
      
      let clickCount = 0;
      let lastClickTime = 0;
      let isDreamMode = false;

      // 1. 启动音频
      const startPlayback = () => {
          audio.play();
          overlay.style.display = 'none';
      };
      overlay.addEventListener('click', startPlayback);

      // 2. 彩蛋触发逻辑：点击“生日快乐”
      triggerBtn.addEventListener('click', (e) => {
          const now = Date.now();
          if (now - lastClickTime > 1000) clickCount = 0; // 超过1秒没点就重置
          
          clickCount++;
          lastClickTime = now;

          if(clickCount >= 5 && !isDreamMode) {
              isDreamMode = true;
              document.body.style.background = "#3d1a2a"; // 切换暖紫色背景
              secretWish.style.opacity = "1";
              // 改变气球颜色池为樱花粉/暖金色
              balloonColors.length = 0;
              balloonColors.push('#ffb3ba', '#ffd1dc', '#fff0f5', '#ffe4e1', '#ffd700');
          }
      });

      // 3. 画布动画
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let sparkles = []; 
      const PARTICLE_COUNT = 80;
      let dpr = window.devicePixelRatio || 1;
      const rand = (min, max) => Math.random() * (max - min) + min;
      const balloonColors = ['#FF6B8B','#FF8E53','#FFD166','#06D6A0','#118AB2','#9D4EDD','#FF99C8','#F15BB5'];

      class Sparkle {
          constructor(x, y, color) {
              this.x = x; this.y = y; this.color = color;
              this.vx = rand(-5, 5); this.vy = rand(-5, 5);
              this.alpha = 1; this.life = 30;
          }
          update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; this.life--; }
          draw(ctx) {
              ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
              ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
              ctx.globalAlpha = 1;
          }
      }

      class Balloon {
        constructor(w, h){ this.w = w; this.h = h; this.reset(true); }
        reset(randomY=true){
          this.radius = rand(20, 35);
          this.x = rand(this.radius, this.w - this.radius);
          this.y = randomY ? rand(0, this.h) : this.h + 100;
          this.color = balloonColors[Math.floor(Math.random()*balloonColors.length)];
          this.vy = rand(-1.5, -0.6); this.vx = rand(-0.3, 0.3);
        }
        update(){
          this.y += this.vy; this.x += this.vx;
          if(this.y + this.radius < -50) this.reset(false);
        }
        draw(ctx){
          ctx.beginPath();
          ctx.moveTo(this.x, this.y + this.radius);
          ctx.lineTo(this.x, this.y + this.radius + 20);
          ctx.strokeStyle = "rgba(255,255,255,0.2)";
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
          ctx.fillStyle = this.color;
          ctx.fill();
          // 高光
          ctx.beginPath();
          ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI*2);
          ctx.fillStyle = "rgba(255,255,255,0.3)";
          ctx.fill();
        }
      }

      // 气球爆破：监听全局点击判断是否点中气球
      window.addEventListener('mousedown', (e) => {
          const mx = e.clientX; const my = e.clientY;
          particles.forEach(p => {
              if(Math.hypot(p.x - mx, p.y - my) < p.radius) {
                  for(let i=0; i<10; i++) sparkles.push(new Sparkle(p.x, p.y, p.color));
                  p.reset(false);
              }
          });
      });

      function resize() {
          canvas.width = window.innerWidth * dpr;
          canvas.height = window.innerHeight * dpr;
          ctx.scale(dpr, dpr);
          particles = Array.from({length: PARTICLE_COUNT}, () => new Balloon(window.innerWidth, window.innerHeight));
      }

      function animate() {
          const w = window.innerWidth; const h = window.innerHeight;
          ctx.clearRect(0,0,w,h);

          // 绘制流星
          if(Math.random() < 0.01) {
              ctx.beginPath();
              let sx = rand(w*0.3, w); let sy = rand(0, h*0.2);
              ctx.moveTo(sx, sy); ctx.lineTo(sx-80, sy+50);
              ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.stroke();
          }

          particles.forEach(p => { p.update(); p.draw(ctx); });
          sparkles = sparkles.filter(s => s.life > 0);
          sparkles.forEach(s => { s.update(); s.draw(ctx); });
          
          requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize
