<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎂 杨天琳 · 生日快乐</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 基础重置 */
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: 'Quicksand', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; perspective: 2000px; }

    /* 视频背景 */
    #video-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 1; filter: brightness(0.5) contrast(1.1);
    }

    /* 启动遮罩 */
    #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 3000;
        display: flex; justify-content: center; align-items: center;
        color: white; cursor: pointer; backdrop-filter: blur(10px);
        font-size: 1.4rem; text-align: center; padding: 20px;
    }

    /* 主界面 3D */
    .birthday-message {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: white; z-index: 100; width: 100%;
      pointer-events: none; transition: opacity 0.5s, transform 0.1s ease-out;
      transform-style: preserve-3d;
    }
    
    .interactive-text { 
      pointer-events: auto; cursor: pointer; user-select: none; 
      display: block; width: fit-content; margin: 0 auto; transform: translateZ(50px);
    }

    .name-a {
      font-family: 'Dancing Script', cursive; font-size: clamp(3rem, 12vw, 7rem);
      background: linear-gradient(135deg, #ffe99c, #ffd1f9, #a7e0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 30px rgba(255, 179, 217, 0.5); margin-bottom: 10px;
    }

    /* 稀世卡片 */
    #id5-card {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      width: 90%; max-width: 350px; height: 75vh; max-height: 550px;
      background: linear-gradient(145deg, #1a1a1c, #0a0a0b); 
      border: 2px solid #d4af37; border-radius: 18px; 
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity 0.6s, transform 0.1s ease-out;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
      padding: 30px 20px; color: #f0f0f0; transform-style: preserve-3d;
    }
    #id5-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

    .skin-desc { 
      flex: 1; width: 100%; overflow-y: auto; font-size: 0.95rem; line-height: 1.7;
      background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 12px;
      margin: 10px 0; text-align: left; border-left: 3px solid #d4af37;
      scrollbar-width: none;
    }

    .final-call {
      display: block; margin-top: 15px; color: #ffd700; font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      animation: soft-glow 2s infinite ease-in-out;
    }
    @keyframes soft-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .spark {
      position: fixed; pointer-events: none; z-index: 2000; background: #fff;
      border-radius: 50%; box-shadow: 0 0 10px #ffd137;
      animation: spark-fly 0.7s ease-out forwards;
    }
    @keyframes spark-fly {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

  <video id="video-bg" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/2hydxo.mp4" type="video/mp4">
  </video>
  
  <audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/yangkz1208/yangtianlin/main/114514.mp3" type="audio/mpeg">
  </audio>
  
  <div id="start-overlay">✨ 点击开启生日惊喜 ✨</div>

  <div class="birthday-message" id="main-ui">
    <div class="name-a interactive-text trigger-egg">杨天琳(/^▽^)/</div>
    <div style="font-size: 1.8rem; color: #fff; font-weight: 600;">HAPPY BIRTHDAY</div>
  </div>

  <div id="id5-card">
    <div style="background: #d4af37; color: #000; padding: 2px 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;">稀世时装</div>
    <div style="color: #d4af37; font-size: 1.6rem; font-weight: bold; margin-bottom: 10px;">永恒光辉</div>
    <div class="skin-desc" id="typewriter-content"></div>
    <button onclick="location.reload()" style="padding: 10px 30px; border-radius: 20px; background: #d4af37; border: none; font-weight: bold; cursor: pointer;">收下祝福</button>
  </div>

  <script>
    (function(){
      const overlay = document.getElementById('start-overlay');
      const audio = document.getElementById('bgm');
      const video = document.getElementById('video-bg');
      const mainUI = document.getElementById('main-ui');
      const id5Card = document.getElementById('id5-card');
      const triggerBtn = document.querySelector('.trigger-egg');
      const typewriterContent = document.getElementById('typewriter-content');
      
      let clickCount = 0;
      let targetX = 0, targetY = 0;
      let curX = 0, curY = 0;

      overlay.addEventListener('click', () => {
          audio.play().catch(() => {});
          video.play();
          if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
              DeviceOrientationEvent.requestPermission().then(state => {
                  if (state === 'granted') window.addEventListener('deviceorientation', e => {
                      targetX = e.gamma / 1.5;
                      targetY = (e.beta - 45) / 1.5;
                  });
              });
          }
          overlay.style.display = 'none';
      });

      function updateFrame() {
          curX += (targetX - curX) * 0.1;
          curY += (targetY - curY) * 0.1;
          const style = `translate(-50%, -50%) rotateY(${curX}deg) rotateX(${-curY}deg)`;
          if(id5Card.classList.contains('active')) id5Card.style.transform = style + " scale(1)";
          else mainUI.style.transform = style;
          requestAnimationFrame(updateFrame);
      }
      updateFrame();

      triggerBtn.addEventListener('click', (e) => {
          clickCount++;
          if(clickCount >= 5) {
              mainUI.style.opacity = "0";
              id5Card.classList.add('active');
              startTypewriter();
          }
      });

      function startTypewriter() {
          // 修复后的纯净文案
          const text = "愿你在奔跑的年纪里，眼里有光，心中有火。<br>不管世界如何喧嚣，你永远是你最耀眼的自己。<br>🌸 祝你岁岁年年，万事胜意 🌸<br><hr style='opacity:0.2;margin:10px 0;'><small style='color:#d4af37'>YKZ 特别备注：</small><br>给你建网站累死了，现在是 4.25，你有许多“好看”的照片在我这(😏)，中考后记得加微信，不然我就上门服务了！<br><span class='final-call'>给我说：我听见了生生不息的回响，获得生日礼物 (doge)</span>";
          
          let i = 0;
          const timer = setInterval(() => {
              if (text[i] === '<') {
                  let end = text.indexOf('>', i);
                  typewriterContent.innerHTML += text.substring(i, end + 1);
                  i = end + 1;
              } else {
                  typewriterContent.innerHTML += text[i] || "";
                  i++;
              }
              if (i >= text.length) {
                  clearInterval(timer);
                  typewriterContent.scrollTop = typewriterContent.scrollHeight;
              }
          }, 45);
      }
    })();
  </script>
</body>
</html>
