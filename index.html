<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎂 杨天琳 · 生日快乐( ´ ▽ ` )ﾉ</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 基础样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        overflow: hidden; background: #0f0c1f; 
        font-family: 'Quicksand', sans-serif; 
        -webkit-tap-highlight-color: transparent; 
        perspective: 1000px; 
    }
    #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 1; }

    /* 启动遮罩 */
    #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 3000;
        display: flex; justify-content: center; align-items: center;
        color: white; cursor: pointer; backdrop-filter: blur(8px);
        font-size: 1.5rem; text-align: center; padding: 20px;
        transition: opacity 0.5s;
    }

    /* 主界面 */
    .birthday-message {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; color: white; z-index: 100; width: 100%;
      transition: opacity 0.6s ease, filter 0.6s ease;
    }
    .name-a {
      font-family: 'Dancing Script', cursive; font-size: clamp(3rem, 12vw, 7.5rem);
      background: linear-gradient(135deg,#ffe99c,#ffd1f9,#a7e0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 30px rgba(255,179,217,0.5); margin-bottom: 10px;
    }
    .birthday-text {
      font-size: clamp(1.6rem, 7vw, 3.5rem); font-weight: 600;
      color: #fff5e6; text-shadow: 0 0 20px #ff99cc;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(5px);
      display: inline-block; padding: 10px 30px; border-radius: 50px;
      border: 1px solid rgba(255,215,245,0.4); cursor: pointer;
    }

    /* 稀世时装卡片 - 3D效果 */
    #id5-card {
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg) scale(0.8);
      width: 90%; max-width: 360px; height: 500px;
      background: linear-gradient(145deg, #1a1a1c, #0a0a0b); 
      border: 2px solid #d4af37; border-radius: 15px; 
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity 0.5s, transform 0.1s ease-out;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
      padding: 30px 20px; color: #f0f0f0; text-align: center;
      transform-style: preserve-3d;
    }
    #id5-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

    .rarity-tag {
      background: linear-gradient(90deg, #d4af37, #f7e695); color: #1a1a1a;
      font-weight: 800; padding: 4px 20px; font-size: 0.85rem;
      position: absolute; top: 15px; left: -10px; transform: rotate(-5deg);
    }
    .skin-title { margin-top: 30px; color: #d4af37; font-size: 1.8rem; font-weight: bold; }
    .skin-desc { 
      font-size: 0.85rem; line-height: 1.6; color: #ececec; 
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;
      margin: 15px 0; text-align: left; border-left: 3px solid #d4af37;
      min-height: 180px; 
    }

    .back-btn {
      width: 100%; padding: 12px; background: #d4af37; border: none;
      color: #1a1a1a; border-radius: 25px; font-weight: bold; cursor: pointer;
      margin-bottom: 10px;
    }
    .zk-mini-card {
      width: 100%; padding: 10px; background: rgba(255,255,255,0.05);
      border: 1px dashed #d4af37; border-radius: 15px; color: #d4af37;
      text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .footer-note { position: absolute; bottom: 18px; right: 24px; color: rgba(255,255,255,0.3); font-size: 0.8rem; z-index: 10; }
  </style>
</head>
<body>
  <audio id="bgm" loop preload="auto">
    <source src="https://raw.githubusercontent.com/yangkz1208/yangtianlin/main/114514.mp3" type="audio/mpeg">
  </audio>
  
  <div id="start-overlay">✨ 点击开启生日惊喜 ✨<br><br><small>( 连点“生日快乐”有惊喜 )</small></div>

  <canvas id="canvas-bg"></canvas>
  
  <div class="birthday-message" id="main-ui">
    <div class="name-a trigger-egg">杨天琳(/^▽^)/</div>
    <div class="birthday-text trigger-egg">生日快乐</div>
    <div style="margin-top:20px; font-size:1.1rem; color:#fbeaff; opacity:0.7;">✨ HAPPY BIRTHDAY ✨</div>
  </div>

  <div id="id5-card">
    <div class="rarity-tag">稀世 (S-Rank)</div>
    <div class="skin-title">永恒光辉</div>
    <div style="font-size: 3rem; margin: 10px;">🕯️</div>
    <div class="skin-desc" id="typewriter-content"></div>

    <button class="back-btn" id="close-card">收下时装</button>
    <a href="https://yangkz1208.github.io/zk" class="zk-mini-card">
        <span>🎁</span> 点击查看更多惊喜 ➔
    </a>
  </div>

  <div class="footer-note">🎈 by 杨凯哲</div>

  <script>
    (function(){
      const overlay = document.getElementById('start-overlay');
      const audio = document.getElementById('bgm');
      const mainUI = document.getElementById('main-ui');
      const id5Card = document.getElementById('id5-card');
      const closeBtn = document.getElementById('close-card');
      const triggerBtns = document.querySelectorAll('.trigger-egg');
      const typewriterContainer = document.getElementById('typewriter-content');
      
      let clickCount = 0;
      let lastClickTime = 0;
      let isCardActive = false;

      // 1. 打字机函数
      function startTypewriter() {
          const fullText = `愿你在奔跑的年纪里，眼里有光，心中有火。<br>不管世界如何喧嚣，你永远是你最耀眼的自己。<br>🌸 祝你岁岁年年，万事胜意 🌸<br><hr style="opacity:0.2;margin:10px 0;"><small style="color:#d4af37;">YKZ特别备注：</small><br>给你建网站累死了，你有许多“好看”的照片在我这(😏)，记得加微信，不然我就上门服务了！`;
          typewriterContainer.innerHTML = "";
          let i = 0;
          const timer = setInterval(() => {
              if (fullText[i] === '<') {
                  let tagEnd = fullText.indexOf('>', i);
                  typewriterContainer.innerHTML += fullText.substring(i, tagEnd + 1);
                  i = tagEnd + 1;
              } else {
                  typewriterContainer.innerHTML += fullText[i];
                  i++;
              }
              if (i >= fullText.length) clearInterval(timer);
          }, 40);
      }

      // 2. 3D 动效 (鼠标移动)
      window.addEventListener('mousemove', (e) => {
          if (!isCardActive) return;
          const x = (window.innerWidth / 2 - e.clientX) / 15;
          const y = (window.innerHeight / 2 - e.clientY) / 15;
          id5Card.style.transform = `translate(-50%, -50%) rotateX(${y}deg) rotateY(${-x}deg)`;
      });

      // 3. 事件交互
      overlay.addEventListener('click', () => {
          audio.play().catch(e => console.log("Audio blocked"));
          overlay.style.opacity = '0';
          setTimeout(() => overlay.style.display = 'none', 500);
      });

      triggerBtns.forEach(btn => {
          btn.addEventListener('click', () => {
              const now = Date.now();
              if (now - lastClickTime > 1500) clickCount = 0;
              clickCount++;
              lastClickTime = now;

              if(clickCount >= 5 && !isCardActive) {
                  isCardActive = true;
                  mainUI.style.opacity = "0";
                  mainUI.style.filter = "blur(10px)";
                  setTimeout(() => {
                      id5Card.classList.add('active');
                      startTypewriter();
                      for(let i=0; i<60; i++) sparkles.push(new Sparkle(window.innerWidth/2, window.innerHeight/2, '#d4af37'));
                  }, 400);
              }
          });
      });

      closeBtn.addEventListener('click', () => {
          id5Card.classList.remove('active');
          isCardActive = false;
          id5Card.style.transform = `translate(-50%, -50%) scale(0.8)`;
          setTimeout(() => {
              mainUI.style.opacity = "1";
              mainUI.style.filter = "blur(0)";
              clickCount = 0;
          }, 400);
      });

      // 4. Canvas 背景逻辑
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d', { alpha: false });
      let particles = [];
      let sparkles = [];
      let dpr = window.devicePixelRatio || 1;

      const rand = (min, max) => Math.random() * (max - min) + min;

      class Balloon {
        constructor(w, h){ 
            this.w = w; this.h = h; 
            this.radius = rand(20, 40);
            this.reset(true); 
        }
        reset(randomY=true){
          this.x = rand(this.radius, this.w - this.radius);
          this.y = randomY ? rand(0, this.h) : this.h + 100;
          this.color = ['#FF6B8B','#FF8E53','#FFD166','#06D6A0','#118AB2','#9D4EDD'][Math.floor(Math.random()*6)];
          this.vy = rand(-1.2, -0.6); 
          this.vx = rand(-0.2, 0.2);
          this.phase = Math.random() * Math.PI * 2;
        }
        update(){
          this.y += this.vy; this.x += this.vx;
          if(this.y + this.radius < -50) this.reset(false);
        }
        draw(ctx){
          ctx.save();
          const breath = Math.sin(Date.now() * 0.002 + this.phase) * 3;
          const r = Math.max(5, this.radius + breath);
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(this.x, this.y, r, 0, Math.PI*2);
          const g = ctx.createRadialGradient(this.x-r/3, this.y-r/3, 0, this.x, this.y, r);
          g.addColorStop(0, 'rgba(255,255,255,0.4)');
          g.addColorStop(1, this.color);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }
      }

      class Sparkle {
          constructor(x, y, color) {
              this.x = x; this.y = y; this.color = color;
              this.vx = rand(-4, 4); this.vy = rand(-4, 4);
              this.alpha = 1; this.life = 60;
          }
          update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.015; this.life--; }
          draw(ctx) {
              ctx.globalAlpha = this.alpha;
              ctx.fillStyle = this.color;
              ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
          }
      }

      function resize() {
          canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
          ctx.scale(dpr, dpr);
          particles = Array.from({length: 40}, () => new Balloon(window.innerWidth, window.innerHeight));
      }

      function animate() {
          const w = window.innerWidth; const h = window.innerHeight;
          ctx.save();
          let grad = ctx.createLinearGradient(0, 0, 0, h);
          grad.addColorStop(0, '#0f0c29'); grad.addColorStop(1, '#0b0815');
          ctx.fillStyle = grad;
          ctx.fillRect(0,0,w,h);
          ctx.restore();

          particles.forEach(p => { p.update(); p.draw(ctx); });

          if(sparkles.length > 200) sparkles.splice(0, sparkles.length - 200);
          sparkles = sparkles.filter(s => s.life > 0);
          sparkles.forEach(s => { s.update(); s.draw(ctx); });
          
          requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();
    })();
  </script>
</body>
</html>
